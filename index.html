<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Snippet&family=Young+Serif&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box1">
        <p class="box1-heading">Your Result</p>
        <div class="score">
          <h2>76</h2>
          <p>of 100</p>
        </div>
        <h3 class="compliment">Great</h3>
        <p class="box1-pgraph">
          You scored higher than 65% of
          <br />
          the people who have taken
          <br />
          these tests.
        </p>
      </div>
      <div class="box2">
        <h3>Summary</h3>
        <div class="reaction">
          <div>
            <img src="assets/images/icon-reaction.svg" alt="reaction" />
            <p>Reaction</p>
          </div>
          <p><b>80</b> / 100</p>
        </div>
        <div class="Memory">
          <div>
            <img src="assets/images/icon-memory.svg" alt="Memory" />
            <p>Memory</p>
          </div>
          <p><b>93cd desktop</b> / 100</p>
        </div>
        <div>
          <div>
            <img src="assets/images/icon-verbal.svg" alt="Verbal" />
            <p>Verbal</p>
          </div>
          <p><b>61</b> / 100</p>
        </div>
        <div class="visual">
          <div>
            <img src="assets/images/icon-visual.svg" alt="visual" />
            <p>Visual</p>
          </div>
          <p><b>72</b> / 101</p>
        </div>
        <a href="">Continue</a>
      </div>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
